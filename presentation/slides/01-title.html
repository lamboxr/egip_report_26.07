<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>封面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
        }
        
        .title-container {
            text-align: center;
            animation: fadeInUp 1s ease;
        }
        
        .product-name {
            font-size: 72px;
            font-weight: bold;
            letter-spacing: 8px;
            margin-bottom: 20px;
            text-shadow: 2px 4px 8px rgba(0,0,0,0.3);
        }
        
        .product-full-name {
            font-size: 28px;
            opacity: 0.9;
            margin-bottom: 40px;
            letter-spacing: 2px;
        }
        
        .divider {
            width: 200px;
            height: 3px;
            background: rgba(255,255,255,0.5);
            margin: 30px auto;
        }
        
        .report-title {
            font-size: 36px;
            margin-top: 20px;
        }
        
        .report-date {
            font-size: 18px;
            opacity: 0.7;
            margin-top: 30px;
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="title-container">
        <h1 class="product-name">EGIP</h1>
        <p class="product-full-name">Engineering Geography Integration Platform</p>
        <div class="divider"></div>
        <h2 class="report-title">产品研发进度汇报</h2>
        <p class="report-date">2026年7月</p>
    </div>
</body>
</html>
